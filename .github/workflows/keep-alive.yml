name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at 08:00 UTC to prevent Supabase free tier from pausing
    - cron: '0 8 */5 * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" https://trafego-eliteweb.onrender.com/health)
          echo "Health check response: $response"
          if [ "$response" -ne 200 ]; then
            echo "⚠️ Health check returned $response"
            exit 1
          fi
          echo "✅ Keep-alive ping successful"
